name: Build Android APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode Google Services JSON
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > leanback-app/google-services.json

      - name: Decode default keystore
        run: |
          mkdir -p security
          echo "${{ secrets.DEFAULT_KEYSTORE_BASE64 }}" | base64 --decode > security/default_keystore

      - name: Decode Secrets.kt
        run: echo "${{ secrets.SECRETS_KT_BASE64 }}" | base64 --decode > core/src/main/kotlin/com/joshgm3z/triplerocktv/core/repository/retrofit/Secrets.kt
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      #- name: Run Unit Tests (:leanback-app)
       # run: ./gradlew leanback-app:testOnlineDebugUnitTest

      #- name: Run Unit Tests (:core)
       # run: ./gradlew core:testOnlineDebugUnitTest

      - name: Build Online Release APK (:leanback-app)
        run: ./gradlew leanback-app:assembleOnlineRelease

      - name: Generate Tag Name
        run: echo "RELEASE_TAG=v$(date +'%Y.%m.%d')" >> $GITHUB_ENV

      - name: Prepare APK for Release
        run: |
          mkdir -p release_artifacts
          cp leanback-app/build/outputs/apk/online/release/*.apk release_artifacts/3RockTV-${{ env.RELEASE_TAG }}.apk

      - name: Publish master-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release_artifacts/3RockTV-${{ env.RELEASE_TAG }}.apk
          body: "Auto-generated latest build from the ${{ github.ref_name }} branch."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
