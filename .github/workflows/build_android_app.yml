name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # This builds the "online" flavor (your default) in Debug mode.
      # To build all flavors, use: ./gradlew assembleDebug
      - name: Build Online Debug APK
        run: ./gradlew assembleOnlineDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: triple-rock-tv-online-debug
          path: app/build/outputs/apk/online/debug/*.apk
