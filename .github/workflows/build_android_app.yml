name: Build Android APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode Google Services JSON
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > leanback-app/google-services.json

      - name: Decode default keystore
        run: |
          mkdir -p security
          echo "${{ secrets.DEFAULT_KEYSTORE_BASE64 }}" | base64 --decode > security/default_keystore

      - name: Decode Secrets.kt
        run: echo "${{ secrets.SECRETS_KT_BASE64 }}" | base64 --decode > core/src/main/kotlin/com/joshgm3z/triplerocktv/core/repository/retrofit/Secrets.kt
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests (:leanback-app)
        run: ./gradlew leanback-app:testOnlineDebugUnitTest

      - name: Run Unit Tests (:core)
        run: ./gradlew core:testOnlineDebugUnitTest

      - name: Generate Tag Name
        run: |
          echo "RELEASE_TAG=v$(TZ='Europe/Stockholm' date +'%Y.%m.%d')" >> $GITHUB_ENV
          echo "RELEASE_CODE=$(TZ='Europe/Stockholm' date +'%Y%m%d')" >> $GITHUB_ENV
          echo "RELEASE_TIMESTAMP=$(TZ='Europe/Stockholm' date +'%Y.%m.%d %I:%M %p %Z')" >> $GITHUB_ENV
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "TRIGGER_SOURCE=pull request (#${{ github.event.pull_request.number }})" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "push" ]; then
            echo "TRIGGER_SOURCE=push to master" >> $GITHUB_ENV
          else
            echo "TRIGGER_SOURCE=manual trigger" >> $GITHUB_ENV
          fi

      - name: Build Online Release APK (:leanback-app)
        run: ./gradlew leanback-app:assembleOnlineRelease -PversionNameOverride=${{ env.RELEASE_TAG }} -PversionCodeOverride=${{ env.RELEASE_CODE }}

      - name: Clear Existing Release and Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          # Delete the release if it exists
          gh release delete $TAG_NAME --yes || echo "No release found"
          
          # Delete the tag on the remote to avoid 'already exists' conflicts
          git push --delete origin $TAG_NAME || echo "No tag found"

      - name: Prepare APK for Release
        run: |
          mkdir -p release_artifacts
          cp leanback-app/build/outputs/apk/online/release/*.apk release_artifacts/3RockTV-app.apk

      - name: Publish master-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release_artifacts/3RockTV-app.apk
          body: "Auto-generated latest build triggered by ${{ env.TRIGGER_SOURCE }}. Uploaded on ${{ env.RELEASE_TIMESTAMP }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
